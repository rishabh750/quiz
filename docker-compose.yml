services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: interviewprep
      POSTGRES_PASSWORD: interviewprep
      POSTGRES_DB: interviewprep
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U interviewprep"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://interviewprep:interviewprep@db:5432/interviewprep
      SECRET_DIR: /data
    env_file:
      - path: .env
        required: false
    volumes:
      - appdata:/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  appdata:
